{{ define "main" }}
<section id="home" class="min-h-screen flex items-center justify-center py-12">
  
  <div class="w-full max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center gap-8">
    
    <!-- ZONE TEXTE -->
    <!-- order-2 sur mobile (passe en bas), order-1 sur grand écran (repasse à gauche) -->
    <div id="hero-area" class="p-6 flex flex-col w-full md:w-3/5 flex-shrink-0 order-2 md:order-1">
      <p class="flex flex-wrap items-center gap-2 md:gap-4 text-orange font-bold text-sm md:text-base mb-4">
        <span>Curiosité</span>
        <span class="text-yellow">•</span>
        <span>Exploration</span>
        <span class="text-yellow">•</span>
        <span>Authenticité</span>
      </p>
      <h1 class="text-xl md:text-3xl text-left text-cream">
        Les <span class="font-mono font-bold text-orange">rêves</span> sont la porte de <span class="font-mono font-bold text-orange">l'ambition.</span>
      </h1>
      <p class="font-mono text-base md:text-xl text-cream">J'ai arrêté d'attendre qu'on m'invite à entrer.</p>
    </div>
    
    <div class="md:w-2/5 flex-shrink-0 order-1 md:order-2">
      <img src="/img/zourite-ssaugrin.svg" 
           loading="lazy" 
           height="200px"
           alt="Zourite aka ssaugrin" 
           aria-hidden="true" 
           class="shadow-img mx-auto h-[200px] lg:h-[300px]">
    </div>
  
  </div>
</section>
{{ end }}
