baseURL = "https://saugrin-sonia.fr/"
languageCode = "fr-fr"
title = "Geek rêveur et développeur avec une façon particulière de penser"
disableKinds = ["taxonomy"]
summaryLength = 20
defaultContentLanguage = 'fr'
rssLimit = 20

[author]
	name = "Sonia SAUGRIN"
	email = "me@ssaugrin.fr"

[permalinks]
  posts = "/blog/:year/:title/"

[params]
  author = "Sonia Saugrin"
  author_email = "me@ssaugrin.fr"
  images = ['screenshot.png']
  description = "Exploratrice à l’imaginaire fertile, le regard toujours tourné vers l’horizon."

[markup.highlight]
  codeFences = true
  guessSyntax = true
  lineNoStart = 1
  lineNos = true
  lineNumbersInTable = false
  tabWidth = 4
  noClasses = false
  style = 'catppuccin-frappe'
[markup.goldmark.renderer]
  unsafe = true
[server]
watch = true

[[server.headers]]
  for = "/**"
  [server.headers.values]
    X-Frame-Options = "DENY"

[build]
writeStats = true

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"

[build.buildStats]
    enable = true
